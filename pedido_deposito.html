<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* SPLASH */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:#080808;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  cursor:pointer;transition:opacity .7s ease;
}
#splash::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 50% 44%,rgba(255,95,0,.1) 0%,transparent 100%);
}
#splash.hide{opacity:0;pointer-events:none;}
.spl-logo{
  width:90%;max-width:420px;
  animation:splRise .9s cubic-bezier(.22,1,.36,1);
  filter:drop-shadow(0 0 18px rgba(255,110,0,.35));
}
.spl-sep{
  width:52px;height:1.5px;
  background:linear-gradient(90deg,transparent,#FF7700,transparent);
  margin:18px 0 14px;
  animation:splRise .9s .15s cubic-bezier(.22,1,.36,1) both;
}
.spl-tag{
  font-family:Arial,sans-serif;font-size:15px;font-weight:300;
  letter-spacing:5px;color:rgba(255,255,255,.72);
  text-transform:none;
  animation:splRise .9s .2s cubic-bezier(.22,1,.36,1) both;
}
@keyframes splRise{
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:translateY(0);}
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;-webkit-text-size-adjust:100%}
button{touch-action:manipulation;-webkit-tap-highlight-color:transparent;cursor:pointer;user-select:none;-webkit-user-select:none}

.hdr{background:#111111;color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.htitle{font-size:17px;font-weight:800}
.hsubt{font-size:12px;color:#FF8C00;margin-top:2px}
.btnped{background:#FF6600;border:none;color:#fff;padding:10px 14px;border-radius:10px;font-size:15px;font-weight:800;display:flex;align-items:center;gap:6px}
.btnped:active{background:#cc5200}
.bdg{background:#fff;color:#FF6600;border-radius:12px;padding:1px 7px;font-size:12px;display:none;font-weight:900}
.btnosc{background:none;border:2px solid rgba(255,255,255,.35);color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;font-weight:800;margin-right:0}
.btnosc:active{background:rgba(255,255,255,.12)}

/* SUPPLIER BAR */
.sup-bar{display:flex;background:#fff;border-bottom:2px solid #eee;position:sticky;top:57px;z-index:95;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.sup-bar::-webkit-scrollbar{display:none}
.sup-tab{flex-shrink:0;padding:12px 16px;font-size:12px;font-weight:800;color:#999;border-bottom:3px solid transparent;white-space:nowrap;letter-spacing:.5px}
.sup-tab.on{color:#FF6600;border-bottom-color:#FF6600}
.sup-tab:active{background:#f5f5f5}
.sup-bdg{background:#FF6600;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:800;margin-left:5px;vertical-align:middle}
.sup-add{color:#FF6600;font-size:18px;padding:8px 14px}

.bar{background:#fff;padding:8px 12px;border-bottom:1px solid #e8e8e8}
.bar input{width:100%;padding:10px 12px;border:2px solid #ddd;border-radius:10px;font-size:16px;background:#fff;-webkit-appearance:none}
.bar input:focus{outline:none;border-color:#FF6600}

.tabs{display:flex;background:#fff;border-bottom:3px solid #eee;position:sticky;top:101px;z-index:90;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;flex:1;padding:12px 4px;text-align:center;font-size:13px;font-weight:800;color:#888;border-bottom:4px solid transparent}
.tab.on{color:#FF6600;border-bottom-color:#FF6600}
.tab:active{background:#f5f5f5}

.sec{display:none;padding:8px 10px 130px}
.sec.on{display:block}
.cat{font-size:11px;font-weight:800;color:#aaa;text-transform:uppercase;padding:16px 4px 6px;letter-spacing:1px}

.p{background:#fff;border-radius:12px;margin-bottom:8px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:5px solid transparent}
.p.on{background:#fff3ea;border-left-color:#FF6600}
.pi{flex:1;min-width:0}
.pn{font-size:19px;font-weight:800;line-height:1.3;color:#111}
.pm{font-size:12px;color:#aaa;margin-top:3px}
.vtag{display:inline-block;background:#FF6600;color:#fff;font-size:10px;font-weight:800;border-radius:4px;padding:1px 5px;margin-left:5px;vertical-align:middle}

.pc{display:flex;align-items:center;gap:8px;flex-shrink:0}
.bm,.bp{width:52px;height:52px;border-radius:50%;border:none;font-size:30px;display:flex;align-items:center;justify-content:center;font-weight:300}
.bm{background:#eee;color:#555}
.bm:active{background:#ddd}
.bp{background:#FF6600;color:#fff}
.bp:active{background:#cc5200}
.pv{display:flex;flex-direction:column;align-items:center;min-width:44px}
.pv-n{font-size:34px;font-weight:900;color:#FF6600;line-height:1}
.pv-l{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:#ccc}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-txt{font-size:18px;font-weight:800;color:#bbb;margin-bottom:8px}
.empty-sub{font-size:14px;color:#ccc}

/* VARIANT POPUP */
.vov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center}
.vpanel{background:#fff;border-radius:18px;padding:20px;width:90%;max-width:340px;max-height:80vh;overflow-y:auto}
.vtit{font-size:14px;font-weight:800;color:#111;margin-bottom:16px;line-height:1.3}
.vopt{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;gap:8px}
.vopt:last-child{border-bottom:none}
.voname{font-size:15px;font-weight:700;flex:1}
.vocount{display:flex;align-items:center;gap:6px}
.vocount .bm,.vocount .bp{width:40px;height:40px;font-size:22px}
.vocount b{width:28px;text-align:center;font-size:20px;font-weight:900;color:#FF6600}
.vdone{width:100%;padding:14px;background:#25D366;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:800;margin-top:14px}
.vdone:active{background:#1da355}

/* CART OVERLAY */
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end}
.ovl.on{display:flex}
.panel{background:#fff;width:100%;max-height:86vh;border-radius:20px 20px 0 0;display:flex;flex-direction:column;overflow:hidden}
.ptop{background:#111111;color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.ptop h2{font-size:18px;font-weight:800}
.xbtn{background:none;border:none;color:#fff;font-size:32px;line-height:1;padding:0 4px}
.pbody{flex:1;overflow-y:auto;padding:8px 16px}
.slbl{font-size:11px;font-weight:800;color:#bbb;text-transform:uppercase;padding:12px 0 5px;letter-spacing:1px}
.ir{padding:12px 0;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;gap:10px}
.irn{font-size:16px;font-weight:800;flex:1}
.irq{font-size:28px;font-weight:900;color:#FF6600;white-space:nowrap}
.irql{font-size:11px;color:#aaa;text-align:right;margin-top:1px}
.vacio{text-align:center;color:#ccc;padding:50px;font-size:16px}
.ppie{padding:14px 16px;border-top:2px solid #eee;flex-shrink:0}
.ptotal{font-size:19px;font-weight:900;display:flex;justify-content:space-between;margin-bottom:12px}
.btn-wa{width:100%;padding:16px;background:#25D366;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:800;margin-bottom:8px}
.btn-wa:active{background:#1da355}
.btn-pdf{width:100%;padding:14px;background:#111111;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:800;margin-bottom:8px}
.btn-pdf:active{background:#000}
.btn-del{width:100%;padding:12px;background:none;color:#e00;border:2px solid #e00;border-radius:10px;font-size:15px;font-weight:700}
.cat-sub{font-size:10px;font-weight:800;color:#FF6600;background:#fff3ea;text-transform:uppercase;padding:6px 4px;letter-spacing:0.5px;margin-top:4px;border-radius:4px}

/* HISTORIAL */
.hov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end}
.hov.on{display:flex}
.hitem{border-bottom:1px solid #eee}
.hitem-hd{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;user-select:none;-webkit-user-select:none}
.hitem-fecha{font-size:12px;color:#aaa}
.hitem-nom{font-size:15px;font-weight:800;margin-top:2px}
.hitem-pal{font-size:14px;font-weight:800;color:#FF6600}
.hitem-arr{font-size:14px;color:#aaa;transition:transform .2s}
.hitem.open .hitem-arr{transform:rotate(90deg)}
.hitem-bd{display:none;padding:0 16px 12px;background:#fafafa}
.hitem.open .hitem-bd{display:block}
.hitem-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px solid #f0f0f0}
.hitem-row:last-child{border-bottom:none}

/* NEW SUPPLIER MODAL */
.nsov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center}
.nsov.on{display:flex}
.nspanel{background:#fff;border-radius:18px;padding:28px 24px;width:90%;max-width:340px}
.nstit{font-size:18px;font-weight:800;color:#111;margin-bottom:20px;text-align:center}
.nsinp{width:100%;padding:14px 16px;border:2px solid #ddd;border-radius:12px;font-size:16px;font-weight:800;background:#fff;-webkit-appearance:none;margin-bottom:14px;text-transform:uppercase}
.nsinp:focus{outline:none;border-color:#FF6600}
.nsbtn{width:100%;padding:14px;background:#111111;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:800;margin-bottom:10px}
.nsbtn:active{background:#000}
.nscan{width:100%;padding:12px;background:none;color:#999;border:2px solid #ddd;border-radius:10px;font-size:15px;font-weight:700}

/* MODO OSCURO */
body.osc{background:#0d0d0d}
body.osc .hdr{background:#080808}
body.osc .sup-bar{background:#181818;border-bottom-color:#252525}
body.osc .sup-tab{color:#555}

body.osc .bar{background:#181818;border-bottom-color:#252525}
body.osc .bar input{background:#0d0d0d;border-color:#303030;color:#e0e0e0}
body.osc .bar input::placeholder{color:#555}
body.osc .tabs{background:#181818;border-bottom-color:#252525}
body.osc .tab{color:#555}
body.osc .tab.on{color:#FF8C00;border-bottom-color:#FF8C00}

body.osc .pm{color:#555}
body.osc .pv-n{color:#FF8C00}

body.osc .pbody .cat-sub{color:#FF8C00;background:#200e00}
body.osc .ir{border-bottom-color:#252525}
body.osc .irn{color:#e0e0e0}
body.osc .irq{color:#FF8C00}
body.osc .irql{color:#555}
body.osc .ppie{border-top-color:#252525;background:#181818}
body.osc .ptotal{color:#e0e0e0}
body.osc .btn-del{color:#ff6666;border-color:#ff6666}
body.osc .vpanel{background:#181818}
body.osc .vtit{color:#e0e0e0}
body.osc .vopt{border-bottom-color:#252525}
body.osc .voname{color:#e0e0e0}
body.osc .vocount b{color:#FF8C00}
body.osc .hitem{border-bottom-color:#252525}
body.osc .hitem-nom{color:#e0e0e0}
body.osc .hitem-pal{color:#FF8C00}
body.osc .hitem-bd{background:#0d0d0d}
body.osc .hitem-row{border-bottom-color:#252525;color:#e0e0e0}
body.osc .nspanel{background:#181818}
body.osc .nstit{color:#e0e0e0}
body.osc .nsinp{background:#0d0d0d;border-color:#303030;color:#e0e0e0}
body.osc .nscan{color:#555;border-color:#252525}
</style>

<!-- SPLASH SCREEN -->
<div id="splash">
  <img class="spl-logo" src="Fenix transparente.png" alt="Fenix">
  <div class="spl-sep"></div>
  <div class="spl-tag">Simplemente Fenix</div>
</div>

<div class="hdr">
  <div><div class="htitle">Pedido Fenix</div><div class="hsubt" id="hsubt">0 pallets</div></div>
  <div style="display:flex;align-items:center;gap:6px">
    <button class="btnosc" id="btnosc" onclick="toggleOsc()">🌙</button>
    <button class="btnosc" data-a="hist" title="Historial">&#128203;</button>
    <button class="btnped" data-a="panel">Pedido <span class="bdg" id="bdg">0</span></button>
  </div>
</div>

<div class="sup-bar" id="supBar"></div>

<div class="bar"><input id="nom" type="text" placeholder="Nombre del empleado..." autocomplete="off" oninput="try{localStorage.setItem('nom',this.value)}catch(e){}"></div>
<div class="bar"><input id="srch" type="search" placeholder="&#128269; Buscar producto..." oninput="buscar()" autocomplete="off"></div>

<div class="tabs" id="tabs"></div>
<div id="secciones"></div>

<!-- VARIANT POPUP -->
<div class="vov" id="vov" onclick="if(event.target===this)cerrarVar()">
  <div class="vpanel">
    <div class="vtit" id="vtit"></div>
    <div id="vopts"></div>
    <button class="vdone" data-a="closevar">Listo</button>
  </div>
</div>

<!-- HISTORY PANEL -->
<div class="hov" id="hov" onclick="if(event.target===this)cerrarHist()">
  <div class="panel">
    <div class="ptop"><h2>Historial</h2><button class="xbtn" data-a="closehist">×</button></div>
    <div class="pbody" id="hbody"></div>
    <div class="ppie">
      <button class="btn-del" data-a="borrhist">Borrar historial</button>
    </div>
  </div>
</div>

<!-- CART PANEL -->
<div class="ovl" id="ovl" onclick="if(event.target===this)cerrar()">
  <div class="panel">
    <div class="ptop"><h2>Tu Pedido</h2><button class="xbtn" data-a="close">×</button></div>
    <div class="pbody" id="pbody"></div>
    <div class="ppie">
      <div class="ptotal"><span>TOTAL</span><span id="ptot"></span></div>
      <button class="btn-wa" data-a="enviar">Enviar texto por WhatsApp</button>
      <button class="btn-pdf" data-a="pdf">Compartir PDF (WhatsApp / Mail)</button>
      <button class="btn-del" data-a="borrar">Borrar pedido</button>
    </div>
  </div>
</div>

<!-- NEW SUPPLIER MODAL -->
<div class="nsov" id="nsov" onclick="if(event.target===this)cerrarNS()">
  <div class="nspanel">
    <div class="nstit">Nuevo Proveedor</div>
    <input class="nsinp" type="text" id="nsNom" placeholder="Nombre del proveedor..." autocomplete="off" autocapitalize="characters">
    <button class="nsbtn" data-a="guardarNS">Guardar</button>
    <button class="nscan" data-a="cerrarNS">Cancelar</button>
  </div>
</div>

// ── STATE ─────────────────────────────────────────────
var currentSup='rolan';
var Q={};
var tabActual=0;

// ── SUPPLIER MANAGEMENT ───────────────────────────────
function getUserSups(){
  try{var s=localStorage.getItem('supList');if(s)return JSON.parse(s);}catch(e){}
  return [];
}
function saveUserSup(sup){
  var ul=getUserSups();
  ul.push(sup);
  try{localStorage.setItem('supList',JSON.stringify(ul));}catch(e){}
}
function getAllSups(){
  var list=[];
  var sc_keys=Object.keys(SC);
  for(var i=0;i<sc_keys.length;i++){
    var id=sc_keys[i];
    list.push({id:id,name:SC[id].name,color:SC[id].color});
  }
  var ul=getUserSups();
  for(var j=0;j<ul.length;j++) list.push(ul[j]);
  return list;
}
function getSupColor(id){
  if(SC[id]) return SC[id].color;
  var ul=getUserSups();
  for(var i=0;i<ul.length;i++) if(ul[i].id===id) return ul[i].color||'#555';
  return '#555';
}
function getCartPallets(supId){
  var qq=(supId===currentSup)?Q:null;
  if(!qq){try{var s=localStorage.getItem('Q_'+supId);if(s)qq=JSON.parse(s);}catch(e){}}
  if(!qq) return 0;
  var total=0,ks=Object.keys(qq);
  for(var i=0;i<ks.length;i++) total+=qq[ks[i]];
  return total;
}

function switchSup(id){
  if(id===currentSup) return;
  saveQ();
  currentSup=id;
  tabActual=0;
  try{localStorage.setItem('lastSup',id);}catch(e){}
  loadQ();
  renderSupBar();
  renderTabs();
  renderProducts();
  updateAllRows();
  updHdr();
  document.getElementById('srch').value='';
  window.scrollTo(0,0);
}

function renderSupBar(){
  var sups=getAllSups();
  var html='';
  for(var i=0;i<sups.length;i++){
    var s=sups[i];
    var on=s.id===currentSup;
    var col=s.color||getSupColor(s.id);
    var pal=getCartPallets(s.id);
    var style=on?(' style="color:'+col+';border-bottom-color:'+col+'"'):'';
    html+='<div class="sup-tab'+(on?' on':'')+'" data-a="sup" data-id="'+s.id+'"'+style+'>'+s.name
      +(pal>0?'<span class="sup-bdg">'+pal+'</span>':'')
      +'</div>';
  }
  html+='<div class="sup-tab sup-add" data-a="nsadd">+</div>';
  document.getElementById('supBar').innerHTML=html;
}

function renderTabs(){
  var tabs=SC[currentSup]?SC[currentSup].tabs:[];
  var html='';
  for(var i=0;i<tabs.length;i++){
    html+='<div class="tab'+(i===tabActual?' on':'')+'" data-a="tab" data-i="'+i+'">'+tabs[i]+'</div>';
  }
  document.getElementById('tabs').innerHTML=html;
}

function renderProducts(){
  var sec=document.getElementById('secciones');
  var prods=SC[currentSup]?SC[currentSup].prods:null;
  if(!prods||!prods.length){
    sec.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-txt">Lista pendiente</div><div class="empty-sub">Próximamente disponible</div></div>';
    return;
  }
  var tabs=SC[currentSup].tabs;
  var html='';
  for(var t=0;t<tabs.length;t++){
    html+='<div class="sec'+(t===tabActual?' on':'')+'" id="s'+t+'">';
    var lastCat='';
    for(var i=0;i<prods.length;i++){
      var p=prods[i];
      if(p.t!==t) continue;
      if(p.c!==lastCat){html+='<div class="cat">'+p.c+'</div>';lastCat=p.c;}
      html+=buildCard(i,p);
    }
    html+='</div>';
  }
  sec.innerHTML=html;
}

function buildCard(i,p){
  var hasV=p.v&&p.v.length>0;
  var vtag=hasV?'<span class="vtag">ELEGIR</span>':'';
  var dn=(p.n+' '+(p.s||'')).toLowerCase();
  return '<div class="p" id="p'+i+'" data-n="'+dn+'">'
    +'<div class="pi"><div class="pn">'+p.n+'</div><div class="pm">'+p.b+' bult/pal'+vtag+'</div></div>'
    +'<div class="pc"><button class="bm" data-a="m" data-i="'+i+'">−</button>'
    +'<span class="pv" id="v'+i+'"><span class="pv-n">0</span><span class="pv-l">pal</span></span>'
    +'<button class="bp" data-a="p" data-i="'+i+'">+</button></div>'
    +'</div>';
}

function updateAllRows(){
  var prods=SC[currentSup]?SC[currentSup].prods:[];
  for(var i=0;i<prods.length;i++){
    var el=document.getElementById('p'+i);
    if(el){el.className='p';var vn=el.querySelector('.pv-n');if(vn)vn.textContent='0';}
  }
  var ks=Object.keys(Q);
  for(var k=0;k<ks.length;k++){
    var key=ks[k];
    var id=key.indexOf('|')>=0?parseInt(key.split('|')[0]):parseInt(key);
    updRow(id);
  }
}

// ── CART ──────────────────────────────────────────────
function saveQ(){try{localStorage.setItem('Q_'+currentSup,JSON.stringify(Q));}catch(e){}}
function loadQ(){try{var s=localStorage.getItem('Q_'+currentSup);Q=s?JSON.parse(s):{};}catch(e){Q={};}}

function getVar(id){
  return SC[currentSup]&&SC[currentSup].prods[id]?SC[currentSup].prods[id].v||null:null;
}

function q(id,d){
  var v=getVar(id);
  if(v){
    if(d>0){abrirVar(id);return;}
    var act=[];
    for(var i=0;i<v.length;i++) if((Q[id+'|'+v[i]]||0)>0) act.push(v[i]);
    if(!act.length) return;
    if(act.length===1){qv(id,act[0],-1);return;}
    abrirVar(id); return;
  }
  var n=Math.max(0,(Q[id]||0)+d);
  if(n===0) delete Q[id]; else Q[id]=n;
  updRow(id); updHdr(); saveQ();
}

function qv(id,v,d){
  var k=id+'|'+v;
  var n=Math.max(0,(Q[k]||0)+d);
  if(n===0) delete Q[k]; else Q[k]=n;
  if(varId===id){
    var vs=getVar(id)||[];
    for(var i=0;i<vs.length;i++){
      if(vs[i]===v){var el=document.getElementById('vv'+id+'_'+i);if(el)el.textContent=n;break;}
    }
  }
  updRow(id); updHdr(); saveQ();
}

function totProd(id){
  var v=getVar(id);
  if(!v) return Q[id]||0;
  var t=0;
  for(var i=0;i<v.length;i++) t+=Q[id+'|'+v[i]]||0;
  return t;
}

function updRow(id){
  var n=totProd(id);
  var el=document.getElementById('v'+id);
  if(el){var nn=el.querySelector('.pv-n');if(nn)nn.textContent=n;else el.textContent=n;}
  var p=document.getElementById('p'+id);
  if(p) p.className='p'+(n>0?' on':'');
}

function updHdr(){
  var tp=0,ks=Object.keys(Q);
  for(var k=0;k<ks.length;k++) tp+=Q[ks[k]];
  var sup=SC[currentSup]?SC[currentSup].name:currentSup.toUpperCase();
  document.getElementById('hsubt').textContent=sup+' · '+tp+' pallet'+(tp!==1?'s':'');
  var b=document.getElementById('bdg');
  b.textContent=tp; b.style.display=tp>0?'inline':'none';
}

// ── TABS ──────────────────────────────────────────────
function setTab(n){
  tabActual=n;
  var tbs=document.querySelectorAll('.tab');
  var ss=document.querySelectorAll('.sec');
  for(var i=0;i<tbs.length;i++) tbs[i].className='tab'+(i===n?' on':'');
  for(var i=0;i<ss.length;i++) ss[i].className='sec'+(i===n?' on':'');
  document.getElementById('srch').value='';
  var ps=document.querySelectorAll('.p');
  for(var i=0;i<ps.length;i++) ps[i].style.display='';
  var cats=document.querySelectorAll('.cat');
  for(var i=0;i<cats.length;i++) cats[i].style.display='';
  window.scrollTo(0,0);
}

// ── BUSCAR ────────────────────────────────────────────
function buscar(){
  var t=document.getElementById('srch').value.toLowerCase().trim();
  var ss=document.querySelectorAll('.sec');
  var ps=document.querySelectorAll('.p');
  var cats=document.querySelectorAll('.cat');
  if(!t){
    for(var i=0;i<ss.length;i++) ss[i].className='sec'+(i===tabActual?' on':'');
    for(var i=0;i<ps.length;i++) ps[i].style.display='';
    for(var i=0;i<cats.length;i++) cats[i].style.display='';
    return;
  }
  for(var i=0;i<ss.length;i++) ss[i].className='sec on';
  for(var i=0;i<ps.length;i++){
    var nm=(ps[i].dataset.n||'').toLowerCase();
    ps[i].style.display=nm.indexOf(t)>=0?'':'none';
  }
  for(var i=0;i<cats.length;i++){
    var nx=cats[i].nextElementSibling,vis=false;
    while(nx&&!nx.classList.contains('cat')){
      if(nx.style.display!=='none'){vis=true;break;}
      nx=nx.nextElementSibling;
    }
    cats[i].style.display=vis?'':'none';
  }
}

  var ks=Object.keys(Q),totalPal=0;
  ks.sort(function(a,b){return parseInt(a)-parseInt(b);});
  var prods=SC[currentSup]?SC[currentSup].prods:[];
  var tabs=SC[currentSup]?SC[currentSup].tabs:[];
  var secs={},ord={};
  for(var t=0;t<tabs.length;t++){secs[t]={l:tabs[t],cats:{}};ord[t]=[];}
  for(var k=0;k<ks.length;k++){
    var key=ks[k],qty=Q[key],id,vn=null;
    if(key.indexOf('|')>=0){var pi=key.indexOf('|');id=parseInt(key.substring(0,pi));vn=key.substring(pi+1);}
    else id=parseInt(key);
    if(!prods[id]) continue;
    var prod=prods[id];
    var t=prod.t; totalPal+=qty;
    var cat=prod.c||'';
    var nm=vn?prod.n+' - '+vn:prod.n;
    if(secs[t]===undefined) continue;
    if(!secs[t].cats[cat]){secs[t].cats[cat]=[];ord[t].push(cat);}
    secs[t].cats[cat].push({nm:nm,qty:qty});
  }
  return {secs:secs,ord:ord,totalPal:totalPal};
}

function renderCart(){
  var ks=Object.keys(Q),body=document.getElementById('pbody');
  if(!ks.length){
    body.innerHTML='<div class="vacio">No hay productos.<br>Suma pallets desde la lista.</div>';
    document.getElementById('ptot').innerHTML=''; return;
  }
  var b=buildItems(),secs=b.secs,ord=b.ord,totalPal=b.totalPal;
  var html='';
  var tabs=SC[currentSup]?SC[currentSup].tabs:[];
  for(var t=0;t<tabs.length;t++){
    if(!ord[t]||!ord[t].length) continue;
    html+='<div class="slbl">'+secs[t].l+'</div>';
    for(var ci=0;ci<ord[t].length;ci++){
      var cat=ord[t][ci],items=secs[t].cats[cat];
      if(cat) html+='<div class="cat-sub">'+cat+'</div>';
      for(var r=0;r<items.length;r++){
        html+='<div class="ir"><div class="irn">'+items[r].nm+'</div><div><div class="irq">'+items[r].qty+'</div><div class="irql">pallets</div></div></div>';
      }
    }
  }
  body.innerHTML=html;
  document.getElementById('ptot').innerHTML=totalPal+' pallets en total';
}

function borrar(){
  Q={};
  var ps=document.querySelectorAll('.p');
  for(var i=0;i<ps.length;i++){ps[i].className='p';var vn=ps[i].querySelector('.pv-n');if(vn)vn.textContent='0';}

}

// ── ENVIAR WA ─────────────────────────────────────────
function enviar(){
  var ks=Object.keys(Q);
  if(!ks.length){alert('No hay productos.');return;}
  var nom=document.getElementById('nom').value.trim();
  if(!nom){alert('Ingresá tu nombre antes de enviar.');document.getElementById('nom').focus();return;}
  var d=new Date();
  var dias=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  var mes=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var b=buildItems(),secs=b.secs,ord=b.ord,totalPal=b.totalPal;
  var supNm=SC[currentSup]?SC[currentSup].name:currentSup.toUpperCase();
  var msg='*PEDIDO '+supNm+' - FENIX*\n';
  msg+=dias[d.getDay()]+' '+d.getDate()+' '+mes[d.getMonth()]+' • '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+'\n';
  msg+=nom+'\n──────────────\n\n';
  var tabs=SC[currentSup]?SC[currentSup].tabs:[];
  for(var t=0;t<tabs.length;t++){
    if(!ord[t]||!ord[t].length) continue;
    msg+='*'+tabs[t]+'*\n';
    for(var ci=0;ci<ord[t].length;ci++){
      var cat=ord[t][ci],items=secs[t].cats[cat];
      if(cat) msg+='_'+cat+'_\n';
      for(var r=0;r<items.length;r++) msg+='• '+items[r].nm+': *'+items[r].qty+' pal*\n';

  }

// ── PDF ───────────────────────────────────────────────
function verPDF(){
  var ks=Object.keys(Q);
  if(!ks.length){alert('No hay productos.');return;}
  var nom=document.getElementById('nom').value.trim();
  if(!nom){alert('Ingresá tu nombre antes de enviar.');document.getElementById('nom').focus();return;}
  var d=new Date();
  var dias=['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
  var diaC=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  var mes=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var mesC=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var b=buildItems(),secs=b.secs,ord=b.ord,totalPal=b.totalPal;
  var supNm=SC[currentSup]?SC[currentSup].name:currentSup.toUpperCase();
  var tabs=SC[currentSup]?SC[currentSup].tabs:[];
  var msg='*PEDIDO '+supNm+' - FENIX*\n';
  msg+=diaC[d.getDay()]+' '+d.getDate()+' '+mesC[d.getMonth()]+' • '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+'\n';
  msg+=nom+'\n──────────────\n\n';
  for(var t=0;t<tabs.length;t++){
    if(!ord[t]||!ord[t].length) continue;
    msg+='*'+tabs[t]+'*\n';
    for(var ci=0;ci<ord[t].length;ci++){
      var cat=ord[t][ci],items=secs[t].cats[cat];
      if(cat) msg+='_'+cat+'_\n';
      for(var r=0;r<items.length;r++) msg+='• '+items[r].nm+': *'+items[r].qty+' pal*\n';
    }
    msg+='\n';
  }
  msg+='──────────────\n*'+totalPal+' pallets en total*';
  if(!window.jspdf){alert('El generador de PDF aún no cargó. Revisá la conexión y reintentá.');return;}
  var azul=[26,58,92],blanco=[255,255,255],grisClaro=[238,242,247];
  var doc=new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  doc.setFillColor(azul[0],azul[1],azul[2]);
  doc.rect(0,0,210,34,'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');
  doc.setFontSize(20);
  doc.text('PEDIDO PAPELERA FENIX - '+supNm,14,14);
  doc.setFontSize(13);
  doc.setFont('helvetica','normal');
  var fechaStr=dias[d.getDay()]+', '+d.getDate()+' de '+mes[d.getMonth()]+' '+d.getFullYear();
  var horaStr=('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
  doc.text(fechaStr+'   |   '+horaStr+'   |   Empleado: '+nom,14,27);
  var body=[];
  for(var t=0;t<tabs.length;t++){
    if(!ord[t]||!ord[t].length) continue;
    body.push([{content:tabs[t],colSpan:2,styles:{fillColor:azul,textColor:blanco,fontStyle:'bold',fontSize:15}}]);
    for(var ci=0;ci<ord[t].length;ci++){
      var cat=ord[t][ci],items=secs[t].cats[cat];
      if(cat) body.push([{content:cat,colSpan:2,styles:{fillColor:grisClaro,textColor:azul,fontStyle:'bold',fontSize:13}}]);
      for(var r=0;r<items.length;r++) body.push([items[r].nm,items[r].qty+' pal']);
    }
  }
  body.push([{content:'TOTAL: '+totalPal+' pallets',colSpan:2,styles:{fillColor:azul,textColor:blanco,fontStyle:'bold',fontSize:15,halign:'right'}}]);
  doc.autoTable({
    startY:38,
    head:[[{content:'Producto',styles:{fillColor:grisClaro,textColor:azul,fontStyle:'bold'}},{content:'Pallets',styles:{fillColor:grisClaro,textColor:azul,fontStyle:'bold',halign:'center',cellWidth:30}}]],
    body:body,
    styles:{fontSize:14,cellPadding:5},
    columnStyles:{1:{halign:'center',cellWidth:30}},
    margin:{left:14,right:14}
  });
  var fname='Pedido_'+supNm+'_'+nom.replace(/\s+/g,'_')+'_'+d.getDate()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'.pdf';
  saveHistorial('pdf');
  var pdfBlob=doc.output('blob');
  var file=new File([pdfBlob],fname,{type:'application/pdf'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    navigator.share({files:[file],title:'Pedido '+supNm+' - '+nom}).catch(function(){
      var url=URL.createObjectURL(pdfBlob);
      var a=document.createElement('a');a.href=url;a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(url);},5000);
      alert('PDF descargado. Abrí WhatsApp, tocá el clip y buscalo en Descargas.');
    });
  } else {
    var url=URL.createObjectURL(pdfBlob);
    var a=document.createElement('a');a.href=url;a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},5000);
    alert('PDF descargado. Abrí WhatsApp, tocá el clip y buscalo en Descargas.');
  }
}

// ── HISTORIAL ─────────────────────────────────────────
function histKey(){return 'hist_'+currentSup;}

function saveHistorial(via){
  var ks=Object.keys(Q);
  if(!ks.length) return;
  var nom=document.getElementById('nom').value.trim()||'sin nombre';
  var b=buildItems(),secs=b.secs,ord=b.ord,totalPal=b.totalPal;
  var items=[];
  var tabs=SC[currentSup]?SC[currentSup].tabs:[];
  for(var t=0;t<tabs.length;t++){
    if(!ord[t]) continue;
    for(var ci=0;ci<ord[t].length;ci++){
      var cat=ord[t][ci],its=secs[t].cats[cat];
      for(var r=0;r<its.length;r++) items.push({nm:its[r].nm,qty:its[r].qty});
    }
  }
  var hist=[];
  try{var s=localStorage.getItem(histKey());if(s)hist=JSON.parse(s);}catch(e){}
  hist.unshift({ts:Date.now(),nom:nom,totalPal:totalPal,via:via,items:items,rawQ:JSON.parse(JSON.stringify(Q))});
  if(hist.length>50) hist.length=50;
  try{localStorage.setItem(histKey(),JSON.stringify(hist));}catch(e){}
}

function verHistorial(){
  var hist=[];
  try{var s=localStorage.getItem(histKey());if(s)hist=JSON.parse(s);}catch(e){}
  var body=document.getElementById('hbody');
  var supNm=SC[currentSup]?SC[currentSup].name:currentSup.toUpperCase();
  if(!hist.length){
    body.innerHTML='<div class="vacio">Sin pedidos enviados a '+supNm+' aún.</div>';
  } else {
    var dias=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
    var mes=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    var html='';
    for(var i=0;i<hist.length;i++){
      var e=hist[i];
      var dd=new Date(e.ts);
      var fecha=dias[dd.getDay()]+' '+dd.getDate()+'/'+mes[dd.getMonth()]+' '+('0'+dd.getHours()).slice(-2)+':'+('0'+dd.getMinutes()).slice(-2);
      var bcolor=e.via==='wa'?'#25D366':'#1a3a5c';
      var blabel=e.via==='wa'?'WA':'PDF';
      html+='<div class="hitem">'
        +'<div class="hitem-hd" onclick="this.parentElement.classList.toggle(\'open\')">'
        +'<div><div class="hitem-fecha">'+fecha+'</div><div class="hitem-nom">'+e.nom+'</div></div>'
        +'<div style="display:flex;align-items:center;gap:8px">'
        +'<span style="background:'+bcolor+';color:#fff;font-size:11px;font-weight:800;border-radius:4px;padding:2px 7px">'+blabel+'</span>'
        +'<span class="hitem-pal">'+e.totalPal+' pal</span>'
        +'<span class="hitem-arr">&#9658;</span>'
        +'</div></div>'
        +'<div class="hitem-bd">';
      for(var j=0;j<e.items.length;j++){
        html+='<div class="hitem-row"><span>'+e.items[j].nm+'</span><span>'+e.items[j].qty+' pal</span></div>';
      }
      if(e.rawQ){
        html+='<button onclick="cargarPedido('+i+')" style="width:100%;margin-top:10px;padding:10px;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:800">Cargar y editar este pedido</button>';
      }
      html+='</div></div>';
    }
    body.innerHTML=html;
  }
  document.getElementById('hov').classList.add('on');
}

function cerrarHist(){document.getElementById('hov').classList.remove('on');}

function cargarPedido(idx){
  var hist=[];
  try{var s=localStorage.getItem(histKey());if(s)hist=JSON.parse(s);}catch(e){}
  var e=hist[idx];
  if(!e||!e.rawQ) return;
  Q=JSON.parse(JSON.stringify(e.rawQ));
  saveQ();
  updateAllRows();
  updHdr();
  cerrarHist();
  abrirPanel();
}

function borrarHist(){
  if(!confirm('¿Borrar todo el historial de este proveedor?')) return;
  try{localStorage.removeItem(histKey());}catch(e){}
  cerrarHist();
}

// ── NUEVO PROVEEDOR ───────────────────────────────────
function abrirNS(){
  document.getElementById('nsNom').value='';
  document.getElementById('nsov').classList.add('on');
  setTimeout(function(){document.getElementById('nsNom').focus();},100);
}
function cerrarNS(){document.getElementById('nsov').classList.remove('on');}
function guardarNS(){
  var nom=document.getElementById('nsNom').value.trim().toUpperCase();
  if(!nom){alert('Ingresá el nombre del proveedor.');return;}
  var id=nom.toLowerCase().replace(/[^a-z0-9]/g,'_');
  var all=getAllSups();
  for(var i=0;i<all.length;i++){if(all[i].id===id){alert('Ya existe un proveedor con ese nombre.');return;}}
  var color=SUP_COLORS[all.length%SUP_COLORS.length];
  saveUserSup({id:id,name:nom,color:color});
  cerrarNS();
  switchSup(id);
}

// ── DISPATCHER ────────────────────────────────────────
document.addEventListener('click',function(e){
  var t=e.target;
  while(t&&t!==document.body&&!(t.dataset&&t.dataset.a)) t=t.parentElement;
  if(!t||!t.dataset||!t.dataset.a) return;
  var a=t.dataset.a,i=parseInt(t.dataset.i);
  if(a==='p')          { q(i,1); }
  else if(a==='m')     { q(i,-1); }
  else if(a==='tab')   { setTab(i); }
  else if(a==='sup')   { switchSup(t.dataset.id); }
  else if(a==='nsadd') { abrirNS(); }
  else if(a==='guardarNS'){ guardarNS(); }
  else if(a==='cerrarNS') { cerrarNS(); }
  else if(a==='panel') { abrirPanel(); }
  else if(a==='close') { cerrar(); }
  else if(a==='borrar'){ borrar(); }
  else if(a==='enviar'){ enviar(); }
  else if(a==='pdf')   { verPDF(); }
  else if(a==='hist')      { verHistorial(); }
  else if(a==='closehist') { cerrarHist(); }
  else if(a==='borrhist')  { borrarHist(); }
  else if(a==='closevar')  { cerrarVar(); }
  else if(a==='qv')    { qv(parseInt(t.dataset.i),t.dataset.v,parseInt(t.dataset.d)); }
});

  setTimeout(function(){s.style.display='none';},700);
}
